<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TABLES IN HTML</title>
</head>
<body>
    <table border="black">
        <caption>A Test Table for Merged Cells</caption>
        <thead>
            <tr>
                <th rowspan="2"></th>
                <th colspan="2">AVERAGE</th>
                <th>RED EYES</th>
            </tr>

            <tr>
                <th>HEIGHT</th>
                <th>WEIGHT</th>
            </tr>

        </thead>

        <tbody>
            <tr>
                <td>MALES</td>
                <td>1.9</td>
                <td>0.003</td>
                <td>40%</td>
            </tr>

            <tr>
                <td>FEMALES</td>
                <td>1.7</td>
                <td>0.002</td>
                <td>43%</td>
            </tr>


        </tbody>

    </table>

    <hr>

    <table border="black">
        <caption>Student Information</caption>
        
            <tr>
                <th rowspan="6">INFO</th>
                <th rowspan="2">Name</th>
                <th colspan="2">Address</th>
            </tr>

            <tr>
                <th>CITY</th>
                <th>HOUSE</th>
            </tr>
        

        
            <tr>
                <td>A</td>
                <td>Delhi</td>
                <td>1</td>
            </tr>
            <tr>
                <td>B</td>
                <td>Mumbai</td>
                <td>2</td>
            </tr>
            <tr>
                <td>C</td>
                <td>Kolkata</td>
                <td>3</td>
            </tr>
            <tr>
                <td>D</td>
                <td>Pune</td>
                <td>4</td>
            </tr>
        

    </table>s
    
</body>
</html>
